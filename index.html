<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Grind</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <ul class="nav-list">
                <li class="nav-item"><a href="#" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="#" class="nav-link">About</a></li>
                <li class="nav-item"><a href="#" class="nav-link">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section class="hero">
        <h1 class="hero-title">Daily Grind</h1>
        <p class="hero-tagline">Fuel your day with a perfect blend</p>
        <button class="btn-primary">View Menu</button>
    </section>
    <section class="signature-drinks">
        <div class="grid">
            <div class="grid-item">
                <div class="image-box"></div>
                <h2 class="drink-name">Caramel Delight</h2>
                <p class="price">$4.50</p>
            </div>
            <div class="grid-item">
                <div class="image-box"></div>
                <h2 class="drink-name">Mocha Madness</h2>
                <p class="price">$5.00</p>
            </div>
            <div class="grid-item">
                <div class="image-box"></div>
                <h2 class="drink-name">Latte Luxury</h2>
                <p class="price">$5.50</p>
            </div>
        </div>
    </section>
    <footer class="footer">
        <p class="opening-hours">Monday - Friday: 7am - 6pm, Saturday - Sunday: 8am - 7pm</p>
        <p class="copyright">&copy; 2024 Daily Grind</p>
    </footer>
</body>
</html>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background-color: #333;
        color: #fff;
    }
    .header {
        position: sticky;
        top: 0;
        background-color: #333;
        padding: 1rem;
        text-align: center;
    }
    .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .nav-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
    }
    .nav-item {
        margin-right: 20px;
    }
    .nav-link {
        color: #fff;
        text-decoration: none;
    }
    .hero {
        background-color: #333;
        padding: 5rem;
        text-align: center;
    }
    .hero-title {
        font-size: 36px;
        margin-bottom: 10px;
    }
    .hero-tagline {
        font-size: 18px;
        margin-bottom: 20px;
    }
    .btn-primary {
        background-color: #ffc107;
        color: #fff;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
    }
    .signature-drinks {
        background-color: #333;
        padding: 5rem;
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-gap: 20px;
    }
    .grid-item {
        background-color: #444;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .image-box {
        width: 100px;
        height: 100px;
        background-color: #555;
        margin-bottom: 20px;
    }
    .drink-name {
        font-size: 18px;
        margin-bottom: 10px;
    }
    .price {
        font-size: 16px;
    }
    .footer {
        background-color: #333;
        padding: 1rem;
        text-align: center;
    }
    .opening-hours {
        font-size: 14px;
        margin-bottom: 10px;
    }
    .copyright {
        font-size: 12px;
    }
</style>
